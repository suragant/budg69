/* ==================== PRINT STYLES (ปรับปรุง) ==================== */
@media print {
  /* Page size/margins */
  @page {
    size: A4;
    margin: 10mm 10mm;
  }

  /* ปรับพื้นหลัง / สี ให้พิมพ์ได้ (Chrome: -webkit-print-color-adjust) */
  html, body {
    background: white !important;
    -webkit-print-color-adjust: exact !important;
    color-adjust: exact !important;
    color: #000 !important;
    padding: 0 !important;
    margin: 0 !important;
    height: auto !important;
    font-family: 'Sarabun', Arial, sans-serif !important;
  }

  /* ซ่อน UI ปกติที่ไม่ต้องการใน PDF */
  .no-print,
  .btn,
  .print-btn,
  .modal-actions,
  .search-filter-section,
  #alertBadge,
  .cursor-not-allowed {
    display: none !important;
  }

  /* ทำให้ container เต็มพื้นที่หน้าและไม่มี padding ที่เบียดเนื้อหา */
  .container {
    max-width: 100% !important;
    padding: 8mm !important;
    margin: 0 auto !important;
  }

  /* โมดัล ให้แสดงเนื้อหาแทน background overlay */
  .modal {
    display: block !important;
    position: relative !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  .modal-content {
    max-width: 100% !important;
    width: auto !important;
    padding: 0 !important;
    box-shadow: none !important;
    background: transparent !important;
    border-radius: 0 !important;
    overflow: visible !important;
  }

  /* Header ที่เราเตรียมไว้สำหรับพิมพ์ — JS จะเปิดให้เป็น block ก่อน print */
  #print-header {
    display: none;
    position: fixed;
    top: 8mm;
    left: 10mm;
    right: 10mm;
    z-index: 9999;
    background: transparent;
    margin: 0;
    padding: 0;
  }

  /* ถ้า #print-header visible ให้เนื้อหาดันลงเล็กน้อย (JS ปรับ margin-top ให้พอดี) */
  .with-print-header {
    margin-top: 28mm !important; /* JS จะปรับ margin-top เป็นพิกเซลที่เหมาะสมก่อนพิมพ์ */
  }

  /* หลีกเลี่ยง box-shadows / gradients ที่อาจพิมพ์แปลก */
  .header, .budget-card, .card-header, .card-body, .dashboard-summary-box {
    box-shadow: none !important;
    background: transparent !important;
  }

  /* ปรับ table ให้ print-friendly */
  table {
    width: 100% !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
    word-break: break-word;
    -webkit-print-color-adjust: exact !important;
  }

  thead {
    display: table-header-group !important; /* ให้ browser ซ้ำหัวบนทุกหน้า */
  }

  tfoot {
    display: table-footer-group !important;
  }

  tr {
    page-break-inside: avoid !important; /* ห้ามตัดแถวกลางหน้า */
    page-break-after: auto !important;
  }

  th, td {
    padding: 6px 8px !important;
    border: 1px solid #ddd !important;
    vertical-align: middle !important;
    font-size: 11pt !important;
    box-sizing: border-box !important;
    hyphens: auto !important;
  }

  /* ห้าม container ที่ครอบตารางทำ overflow: auto ในการพิมพ์ */
  .table-wrapper, .modal-content, .container, #dashboardContainer, #workDetailContent {
    overflow: visible !important;
    max-height: none !important;
    height: auto !important;
  }

  /* ปรับภาพ/ canvas ให้ไม่ล้นหน้า */
  img, svg, canvas {
    max-width: 100% !important;
    height: auto !important;
    page-break-inside: avoid !important;
  }

  /* Elements ที่ต้องการให้ไม่ถูกตัดขอบหน้า */
  .dashboard-summary-box,
  .budget-card,
  .budget-summary,
  .detail-section {
    page-break-inside: avoid !important;
    page-break-after: auto !important;
  }

  /* ปรับสีเส้น/normal text ให้คมเวลา print */
  .amount-budget, .amount-used, .amount-remaining {
    color: #000 !important;
  }

  /* ถ้าจำเป็น สามารถซ่อน element ที่เป็น sticky/fixed ให้เป็น static */
  .sticky, .fixed, header, .topbar, .modal-header {
    position: static !important;
  }

  /* ถ้าเจอปัญหาตารางคอลัมน์เล็กเกิน ให้ปรับ font-size ลงเล็กน้อย */
  @media print and (max-width: 210mm) {
    th, td { font-size: 10pt !important; }
  }
}

/* Helper class ใช้สำหรับซ่อนเฉพาะบนหน้าจอ (แต่ให้แสดงตอนพิมพ์) */
