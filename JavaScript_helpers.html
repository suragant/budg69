<script nonce="SSR2ii5fRwtNJngHlEUxow">
'use strict';

window.escapeHtml = function(text) {
  if (!text) return '';
  const map = {
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#039;'
  };
  return String(text).replace(/[&<>"']/g, m => map[m]);
};

window.createSafeTextNode = function(text) {
  return document.createTextNode(text || '');
};

window.setElementText = function(elem, text) {
  if (!elem) return;
  while (elem.firstChild) {
    elem.removeChild(elem.firstChild);
  }
  elem.appendChild(window.createSafeTextNode(text));
};

window.validateExpenseForm = function(formData) {
  const errors = [];
  const { date, amount, description } = formData;

  if (!date || !date.trim()) {
    errors.push('วันที่จำเป็น');
  } else {
    const selectedDate = new Date(date);
    const today = new Date();
    selectedDate.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);

    if (isNaN(selectedDate.getTime())) {
      errors.push('รูปแบบวันที่ไม่ถูกต้อง');
    } else if (selectedDate > today) {
      errors.push('ไม่สามารถบันทึกวันที่ในอนาคตได้');
    } else if (selectedDate < new Date(today.getTime() - 365 * 24 * 60 * 60 * 1000)) {
      errors.push('ไม่สามารถบันทึกเบิกจ่ายเก่ากว่า 1 ปีได้');
    }
  }

  const amountNum = parseFloat(amount);
  if (isNaN(amountNum) || amountNum <= 0) {
    errors.push('จำนวนเงินต้องมากกว่า 0');
  } else if (amountNum > 9999999.99) {
    errors.push('จำนวนเงินมากเกินไป (สูงสุด 9,999,999.99 บาท)');
  }

  if (description && description.length > 500) {
    errors.push('รายละเอียดต้องไม่เกิน 500 ตัวอักษร');
  }

  return {
    valid: errors.length === 0,
    errors
  };
};

window.displayFormErrors = function(errors) {
  document.querySelectorAll('.form-error').forEach(el => {
    el.textContent = '';
    el.style.display = 'none';
  });

  Object.keys(errors).forEach(fieldId => {
    const errorEl = document.getElementById(fieldId + 'Error');
    if (errorEl) {
      errorEl.textContent = errors[fieldId];
      errorEl.style.display = 'block';
    }
  });
};

window.showCustomAlert = function(type, title, message, onClose) {
  const modal = document.getElementById('customAlertModal');
  const titleEl = document.getElementById('customAlertTitle');
  const messageEl = document.getElementById('customAlertMessage');
  const okBtn = document.getElementById('customAlertOkBtn');

  if (!modal || !titleEl || !messageEl) {
    console.error('Custom alert modal not found');
    alert(title + '\n' + message);
    return;
  }

  modal.style.borderLeft = {
    'success': '4px solid #4CAF50',
    'error': '4px solid #f44336',
    'warning': '4px solid #ff9800',
    'info': '4px solid #2196F3'
  }[type] || '4px solid #2196F3';

  window.setElementText(titleEl, title);
  messageEl.innerHTML = window.escapeHtml(message);

  if (onClose) {
    okBtn._customOnClose = onClose;
  }

  modal.style.display = 'flex';
  okBtn.focus();

  okBtn.onclick = function() {
    modal.style.display = 'none';
    if (okBtn._customOnClose) {
      okBtn._customOnClose();
      delete okBtn._customOnClose;
    }
  };
};

window.debounce = function(fn, delay = 300) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn.apply(this, args), delay);
  };
};

window.throttle = function(fn, interval = 300) {
  let lastCall = 0;
  return function(...args) {
    const now = Date.now();
    if (now - lastCall >= interval) {
      lastCall = now;
      fn.apply(this, args);
    }
  };
};

console.log('Security and utility scripts loaded');
</script>
