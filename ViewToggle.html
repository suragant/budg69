<!--
  ViewToggle.html (v4)
  แก้ไข:
  1. ปุ่มโอนงบหายหลัง refresh → re-init ใน _initViewToggle
  2. card view เพี้ยน → ลบ .tile-amt และ .tile-work ออกตอน switch กลับ card
  3. header หายตอน switch tile → rebuild wrapper ถ้า container หลุดออกไป
-->

<style>
#viewToggleBtn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 1.5px solid #667eea;
  border-radius: 8px;
  background: transparent;
  color: #667eea;
  font-family: 'Sarabun', Arial, sans-serif;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}
#viewToggleBtn:hover { background: #667eea; color: white; }

#tileViewWrapper {
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  overflow: hidden;
  display: none;
}
#tileViewWrapper.visible { display: block; }

#tileHeader {
  display: grid;
  grid-template-columns: 180px 160px 160px minmax(260px, 1fr) 110px 110px 120px 140px;
  gap: 0 12px;
  padding: 9px 16px;
  background: #667eea;
  color: white;
  font-size: 12px;
  font-weight: bold;
}
#tileHeader span { white-space: nowrap; }
#tileHeader .th-right { text-align: right; }
#tileHeader .tile-sort-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  padding: 0;
  border: none;
  background: transparent;
  color: inherit;
  font: inherit;
  font-weight: inherit;
  cursor: pointer;
}
#tileHeader .tile-sort-btn::after {
  content: '↕';
  font-size: 11px;
  opacity: 0.65;
}
#tileHeader .tile-sort-btn.is-active::after {
  content: '↑';
  opacity: 1;
}
#tileHeader .tile-sort-btn.is-active.desc::after {
  content: '↓';
}

#budgetContainer.tile-view {
  display: block !important;
  background: transparent !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  gap: 0 !important;
}

#budgetContainer.tile-view .budget-card {
  display: grid !important;
  grid-template-columns: 180px 160px 160px minmax(260px, 1fr) 110px 110px 120px 140px !important;
  align-items: start !important;
  gap: 0 12px !important;
  border-radius: 0 !important;
  border: none !important;
  border-bottom: 1px solid #eee !important;
  box-shadow: none !important;
  padding: 9px 16px !important;
  margin: 0 !important;
  min-height: 52px !important;
  transition: background 0.1s !important;
}
#budgetContainer.tile-view .budget-card:hover {
  background: #f5f6ff !important;
  transform: none !important;
  box-shadow: none !important;
}

/* ซ่อน card-header (department) ใน tile */
#budgetContainer.tile-view .card-header { display: none !important; }

.tile-work {
  font-size: 12px;
  font-weight: 600;
  color: #333;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  grid-column: 1;
  grid-row: 1;
  align-self: start;
}
.tile-department,
.tile-budget-type {
  font-size: 12px;
  color: #475569;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tile-department { grid-column: 2; grid-row: 1; }
.tile-budget-type { grid-column: 3; grid-row: 1; }
.tile-department,
.tile-budget-type {
  align-self: start;
}

#budgetContainer.tile-view .card-body {
  display: none !important;
  min-width: 0;
  overflow: hidden;
}
#budgetContainer.tile-view .progress-ring,
#budgetContainer.tile-view .detail-section,
#budgetContainer.tile-view .budget-summary { display: none !important; }
#budgetContainer.tile-view .item-id {
  display: none !important;
}
.tile-item-name {
  font-size: 12px;
  color: #1f2937;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.35;
  grid-column: 4;
  grid-row: 1;
  align-self: start;
}

#budgetContainer.tile-view .tile-amt {
  text-align: right;
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
}
#budgetContainer.tile-view .tile-amt-budget    { color: #4CAF50; }
#budgetContainer.tile-view .tile-amt-used      { color: #FF9800; }
#budgetContainer.tile-view .tile-amt-remaining { color: #2196F3; }
#budgetContainer.tile-view .tile-amt-budget { grid-column: 5; grid-row: 1; }
#budgetContainer.tile-view .tile-amt-used { grid-column: 6; grid-row: 1; }
#budgetContainer.tile-view .tile-amt-remaining { grid-column: 7; grid-row: 1; }
#budgetContainer.tile-view .tile-amt,
#budgetContainer.tile-view .card-actions {
  align-self: start;
}

#budgetContainer.tile-view .card-actions {
  grid-column: 8;
  grid-row: 1;
  padding: 0 !important;
  gap: 6px !important;
  justify-content: flex-end !important;
  flex-wrap: nowrap !important;
}
#budgetContainer.tile-view .card-actions .btn {
  flex: none !important;
  padding: 5px 10px !important;
  font-size: 11px !important;
  margin: 0 !important;
}
</style>

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'budgetViewMode';
  var currentMode = 'card';
  var _btn = null;
  var tileSortKey = '';
  var tileSortDir = 'asc';

  function fmtNum(n) {
    return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function compareText(a, b) {
    return String(a || '').localeCompare(String(b || ''), 'th', { sensitivity: 'base', numeric: true });
  }

  function compareNumber(a, b) {
    return Number(a || 0) - Number(b || 0);
  }

  function sortFilteredItems() {
    if (!tileSortKey || !(window.State && Array.isArray(window.State.filteredItems))) return;
    var dir = tileSortDir === 'desc' ? -1 : 1;
    window.State.filteredItems.sort(function (a, b) {
      if (tileSortKey === 'budget' || tileSortKey === 'used' || tileSortKey === 'remaining') {
        return compareNumber(a && a[tileSortKey], b && b[tileSortKey]) * dir;
      }
      return compareText(a && a[tileSortKey], b && b[tileSortKey]) * dir;
    });
  }

  function updateTileSortIndicators() {
    var header = document.getElementById('tileHeader');
    if (!header) return;
    header.querySelectorAll('.tile-sort-btn').forEach(function (btn) {
      var key = btn.getAttribute('data-sort-key') || '';
      var active = key === tileSortKey;
      btn.classList.toggle('is-active', active);
      btn.classList.toggle('desc', active && tileSortDir === 'desc');
    });
  }

  function bindTileHeaderSorting(header) {
    if (!header || header.__tileSortBound) return;
    header.__tileSortBound = true;
    header.addEventListener('click', function (e) {
      var btn = e.target && e.target.closest ? e.target.closest('.tile-sort-btn') : null;
      if (!btn) return;
      var key = btn.getAttribute('data-sort-key') || '';
      if (!key) return;
      if (tileSortKey === key) {
        tileSortDir = tileSortDir === 'asc' ? 'desc' : 'asc';
      } else {
        tileSortKey = key;
        tileSortDir = (key === 'budget' || key === 'used' || key === 'remaining') ? 'desc' : 'asc';
      }
      sortFilteredItems();
      updateTileSortIndicators();
      if (typeof window.renderCards === 'function') {
        window.renderCards((window.State && window.State.filteredItems) ? window.State.filteredItems : []);
      }
    });
  }

  /* ── ลบ tile injected elements ออกจาก card (ก่อน switch กลับ card) ── */
  function cleanupTileInjections() {
    var container = document.getElementById('budgetContainer');
    if (!container) return;
    container.querySelectorAll('.tile-work, .tile-department, .tile-budget-type, .tile-item-name, .tile-amt').forEach(function (el) {
      el.parentNode && el.parentNode.removeChild(el);
    });
  }

  /* ── ensureWrapper: สร้างหรือ rebuild ถ้า container หลุดออกจาก wrapper ── */
  function ensureWrapper() {
    var container = document.getElementById('budgetContainer');
    if (!container) return null;

    var wrapper = document.getElementById('tileViewWrapper');

    // ถ้า wrapper มีอยู่แล้วและ container อยู่ใน wrapper → ใช้ได้เลย
    if (wrapper && wrapper.contains(container)) return wrapper;

    // ถ้า wrapper มีแต่ container หลุดออก → เอา container กลับเข้าไป
    if (wrapper) {
      wrapper.appendChild(container);
      return wrapper;
    }

    // ไม่มี wrapper เลย → สร้างใหม่
    if (!container.parentNode) return null;

    var header = document.createElement('div');
    header.id = 'tileHeader';
    header.innerHTML =
      '<span><button type="button" class="tile-sort-btn" data-sort-key="work">แผนงาน</button></span>' +
      '<span><button type="button" class="tile-sort-btn" data-sort-key="department">หน่วยงาน</button></span>' +
      '<span><button type="button" class="tile-sort-btn" data-sort-key="budgetType">ประเภทงบ</button></span>' +
      '<span><button type="button" class="tile-sort-btn" data-sort-key="item">รายการ</button></span>' +
      '<span class="th-right"><button type="button" class="tile-sort-btn" data-sort-key="budget">งบประมาณ</button></span>' +
      '<span class="th-right"><button type="button" class="tile-sort-btn" data-sort-key="used">เบิกจ่าย</button></span>' +
      '<span class="th-right"><button type="button" class="tile-sort-btn" data-sort-key="remaining">คงเหลือ</button></span>' +
      '<span class="th-right">การดำเนินการ</span>';
    bindTileHeaderSorting(header);
    updateTileSortIndicators();

    wrapper = document.createElement('div');
    wrapper.id = 'tileViewWrapper';
    wrapper.appendChild(header);
    container.parentNode.insertBefore(wrapper, container);
    wrapper.appendChild(container);

    return wrapper;
  }

  /* ── inject tile cols ─────────────────────────────────────── */
  function injectTileCols() {
    var container = document.getElementById('budgetContainer');
    if (!container) return;

    container.querySelectorAll('.budget-card').forEach(function (card) {

      /* col 1: work */
      if (!card.querySelector('.tile-work')) {
        var workDiv = document.createElement('div');
        workDiv.className = 'tile-work';
        var workText = card.getAttribute('data-work') || '';
        workDiv.textContent = workText;
        workDiv.title = workText;
        card.insertBefore(workDiv, card.firstChild);
      }

      /* col 2: department */
      if (!card.querySelector('.tile-department')) {
        var departmentDiv = document.createElement('div');
        departmentDiv.className = 'tile-department';
        var departmentText = card.getAttribute('data-department') || '';
        departmentDiv.textContent = departmentText;
        departmentDiv.title = departmentText;
        card.appendChild(departmentDiv);
      }

      /* col 3: budget type */
      if (!card.querySelector('.tile-budget-type')) {
        var budgetTypeDiv = document.createElement('div');
        budgetTypeDiv.className = 'tile-budget-type';
        var budgetTypeText = card.getAttribute('data-budget-type') || '';
        budgetTypeDiv.textContent = budgetTypeText;
        budgetTypeDiv.title = budgetTypeText;
        card.appendChild(budgetTypeDiv);
      }

      /* col 4: item name */
      if (!card.querySelector('.tile-item-name')) {
        var nameDiv = document.createElement('div');
        nameDiv.className = 'tile-item-name';
        var itemText = card.getAttribute('data-item') || '';
        nameDiv.textContent = itemText;
        nameDiv.title = itemText;
        card.appendChild(nameDiv);
      }

      /* cols 3-5: amounts */
      if (card.querySelector('.tile-amt')) return;
      var bEl = card.querySelector('.amount-budget');
      var uEl = card.querySelector('.amount-used');
      var rEl = card.querySelector('.amount-remaining');
      var budget    = bEl ? bEl.textContent.replace(/[^0-9.]/g, '') : (card.getAttribute('data-budget')    || '0');
      var used      = uEl ? uEl.textContent.replace(/[^0-9.]/g, '') : (card.getAttribute('data-used')      || '0');
      var remaining = rEl ? rEl.textContent.replace(/[^0-9.]/g, '') : (card.getAttribute('data-remaining') || '0');

      function makeAmt(cls, val) {
        var d = document.createElement('div');
        d.className = 'tile-amt ' + cls;
        d.textContent = fmtNum(val) + ' ฿';
        return d;
      }
      var actions = card.querySelector('.card-actions');
      if (actions) {
        var rDiv = makeAmt('tile-amt-remaining', remaining);
        var uDiv = makeAmt('tile-amt-used',      used);
        var bDiv = makeAmt('tile-amt-budget',    budget);
        card.insertBefore(rDiv, actions);
        card.insertBefore(uDiv, rDiv);
        card.insertBefore(bDiv, uDiv);
      }
    });
  }

  /* ── apply mode ───────────────────────────────────────────── */
  function applyMode(mode) {
    var container = document.getElementById('budgetContainer');
    if (!container) return;

    if (mode === 'tile') {
      var wrapper = ensureWrapper();
      sortFilteredItems();
      injectTileCols();
      container.classList.add('tile-view');
      if (wrapper) {
        wrapper.classList.add('visible');
        updateTileSortIndicators();
      }
    } else {
      // ✅ ลบ injected elements ก่อน switch กลับ card
      cleanupTileInjections();

      var wrapper = document.getElementById('tileViewWrapper');
      if (wrapper && wrapper.parentNode && wrapper.contains(container)) {
        wrapper.parentNode.insertBefore(container, wrapper);
        wrapper.classList.remove('visible');
      }
      container.classList.remove('tile-view');
    }

    currentMode = mode;
    updateBtn(mode);
    try { localStorage.setItem(STORAGE_KEY, mode); } catch (e) {}
  }

  function updateBtn(mode) {
    if (!_btn) return;
    _btn.innerHTML = mode === 'tile' ? '&#9638; มุมมอง Card' : '&#8801; มุมมอง Tile';
    _btn.title     = mode === 'tile' ? 'สลับเป็นมุมมอง Card' : 'สลับเป็นมุมมอง Tile';
  }

  function createBtn() {
    var btn = document.getElementById('viewToggleBtn');
    if (btn) { _btn = btn; return; }
    btn = document.createElement('button');
    btn.id   = 'viewToggleBtn';
    btn.type = 'button';
    _btn = btn;
    var dashBtn = document.querySelector('[data-action="show-dashboard"]');
    if (dashBtn && dashBtn.parentNode) dashBtn.parentNode.insertBefore(btn, dashBtn.nextSibling);
    else { var h = document.querySelector('.header'); if (h) h.appendChild(btn); }
  }

  function ensureBtnAttached() {
    var dashBtn = document.querySelector('[data-action="show-dashboard"]');
    var btn = document.getElementById('viewToggleBtn') || _btn;
    if (!btn) {
      createBtn();
      btn = _btn;
    }
    if (!btn) return;
    if (dashBtn && dashBtn.parentNode && btn.parentNode !== dashBtn.parentNode) {
      dashBtn.parentNode.insertBefore(btn, dashBtn.nextSibling);
    }
  }

  function wrapRenderCards() {
    if (typeof window.renderCards !== 'function' || window.renderCards.__vtWrapped) return;
    var orig = window.renderCards;
    window.renderCards = function () {
      // ✅ cleanup injections ก่อน re-render เสมอ
      cleanupTileInjections();
      orig.apply(this, arguments);
      ensureBtnAttached();
      if (currentMode === 'tile') setTimeout(function () { applyMode('tile'); }, 0);
    };
    window.renderCards.__vtWrapped = true;
  }

  /* ── _initViewToggle (idempotent) ─────────────────────────── */
  window._initViewToggle = function () {
    var existing = document.getElementById('viewToggleBtn');
    if (existing && document.body.contains(existing)) {
      // ปุ่มมีอยู่แล้ว แค่ sync mode
      _btn = existing;
      updateBtn(currentMode);
      ensureBtnAttached();
      wrapRenderCards();
      return;
    }

    createBtn();
    try { currentMode = localStorage.getItem(STORAGE_KEY) || 'card'; } catch (e) {}
    ensureBtnAttached();
    updateBtn(currentMode);
    _btn.addEventListener('click', function () {
      applyMode(currentMode === 'card' ? 'tile' : 'card');
    });
    wrapRenderCards();
    if (currentMode === 'tile') setTimeout(function () { applyMode('tile'); }, 400);
  };

  /* ── wrap displayData เพื่อ re-show ปุ่มโอนงบหลัง reload ─── */
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', window._initViewToggle);
  else window._initViewToggle();

  setTimeout(function () {
    if (typeof window._initViewToggle === 'function') window._initViewToggle();
  }, 400);
  setTimeout(function () {
    if (typeof window._initViewToggle === 'function') window._initViewToggle();
  }, 1200);

})();
</script>
