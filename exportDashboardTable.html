<script>
(function(global){
  'use strict';
  const G = (typeof globalThis !== 'undefined') ? globalThis : global;

  // build wrappers from a table element, remove Action column, add numeric totals footer
  function buildWrappersFromTable(table, contentWidthPx, rowsPerPage) {
    const rawHeaders = Array.from(table.querySelectorAll('thead th')).map(th=> (th.textContent||'').trim());
    const skipIdx = new Set();
    rawHeaders.forEach((h, idx) => {
      const lk = (h||'').toLowerCase();
      // broaden detection of action-like columns
      if (lk.includes('action') || lk.includes('ปฏิบัติ') || lk.includes('ปุ่ม') || lk.includes('ดำเนินการ') || lk.includes('operation') || lk.includes('actions')) skipIdx.add(idx);
    });
    const headers = rawHeaders.filter((_, idx)=> !skipIdx.has(idx));

    const trs = Array.from(table.querySelectorAll('tbody tr'));
    const rawRows = trs.map(tr => Array.from(tr.querySelectorAll('td')).map(td => (td.textContent||'').trim()));

    function parseNum(s) {
      if (s == null) return 0;
      // normalize NBSP, currency symbols etc.
      const n = String(s).replace(/\u00A0/g,' ').replace(/[^\d\-\.\,]/g,'').replace(/,/g,'');
      const v = parseFloat(n);
      return isNaN(v) ? 0 : v;
    }
    const numericColCandidates = ['งบ','งบรวม','เบิก','คงเหลือ','amount','total','used','budget','ยอดรวม','รวม'];
    const isNumericCol = (hdr) => {
      const x = (hdr||'').toLowerCase();
      return numericColCandidates.some(k => x.includes(k));
    };

    const filteredRows = rawRows.map(r => r.filter((_, idx) => !skipIdx.has(idx)));

    // handle empty case robustly
    const totals = new Array(filteredRows[0] ? filteredRows[0].length : headers.length).fill(0);
    for (const row of filteredRows) {
      for (let ci=0; ci<row.length; ci++) {
        const hdr = headers[ci] || '';
        if (isNumericCol(hdr)) totals[ci] += parseNum(row[ci]);
      }
    }

    const wrappers = [];
    if (!filteredRows || filteredRows.length === 0) {
      console.warn('buildWrappersFromTable: no data rows found in table');
    }
    for (let i=0;i<filteredRows.length;i+=rowsPerPage) {
      const part = filteredRows.slice(i, i+rowsPerPage);
      const wrap = document.createElement('div');
      wrap.style.width = contentWidthPx + 'px';
      wrap.style.background = '#fff';
      wrap.style.boxSizing = 'border-box';
      wrap.style.padding = '4px';
      const styleEl = document.createElement('style');
      styleEl.textContent = `table{table-layout:fixed;width:100%;border-collapse:collapse;font-size:11px;} th,td{padding:6px;border:1px solid #ddd;vertical-align:top;} tfoot td{font-weight:700;background:#f7f7f7;}`;
      wrap.appendChild(styleEl);

      const t = document.createElement('table');
      const thead = document.createElement('thead'); const trh = document.createElement('tr');
      headers.forEach(h => { const th = document.createElement('th'); th.textContent = h; th.style.background = '#f5f5f5'; trh.appendChild(th); });
      thead.appendChild(trh); t.appendChild(thead);

      const tbody = document.createElement('tbody');
      part.forEach(r => {
        const tr = document.createElement('tr');
        r.forEach(cell => { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      t.appendChild(tbody);

      if (i + rowsPerPage >= filteredRows.length) {
        const tfoot = document.createElement('tfoot');
        const trf = document.createElement('tr');
        for (let ci=0; ci<headers.length; ci++) {
          const td = document.createElement('td');
          if (ci === 0) {
            td.textContent = 'รวม';
          } else {
            const hdr = headers[ci] || '';
            if (isNumericCol(hdr)) {
              try {
                td.textContent = new Intl.NumberFormat('th-TH').format(totals[ci]);
              } catch(e) {
                td.textContent = (Math.round(totals[ci]*100)/100).toString();
              }
            } else {
              td.textContent = '';
            }
          }
          trf.appendChild(td);
        }
        tfoot.appendChild(trf);
        t.appendChild(tfoot);
      }

      wrap.appendChild(t);

      const footer = document.createElement('div'); footer.style.textAlign='right'; footer.style.fontSize='11px'; footer.style.marginTop='8px';
      footer.textContent = `หน้า ${wrappers.length+1} / ${Math.ceil(filteredRows.length/rowsPerPage)}`;
      wrap.appendChild(footer);

      wrappers.push(wrap);
    }
    return wrappers;
  }

  // choose table: prefer global id, otherwise best guess
  function _selectTableForDashboard(root) {
    const prefer = document.getElementById('dashboardSummaryTable');
    if (prefer && (prefer.querySelectorAll('tbody tr')||[]).length > 0) return prefer;
    const candidates = Array.from((root && root.querySelectorAll) ? root.querySelectorAll('table') : []);
    if (!candidates.length) {
      console.warn('_selectTableForDashboard: no table candidates found in root');
      return null;
    }
    for (const t of candidates) {
      const heads = (t.querySelectorAll('thead th')||[]).length;
      const rows = (t.querySelectorAll('tbody tr')||[]).length;
      if (heads > 0 && rows > 0) return t;
    }
    const sorted = candidates.slice().sort((a,b) => ((b.querySelectorAll('tbody tr')||[]).length - (a.querySelectorAll('tbody tr')||[]).length));
    const best = sorted[0];
    if (best && (best.querySelectorAll('tbody tr')||[]).length > 0) return best;
    console.warn('_selectTableForDashboard: no suitable table found after heuristics');
    return null;
  }

  async function appendDashboardTablesToPdf(pdf, headerMeta, opts = {}) {
    if (!pdf) throw new Error('pdf instance required');
    const A4 = { widthPt: 595.28, heightPt: 841.89 };
    const pageWidthPt = opts.pageWidthPt || A4.heightPt;
    const pageHeightPt = opts.pageHeightPt || A4.widthPt;
    const marginPt = (typeof opts.marginPt === 'number') ? opts.marginPt : 36;
    const contentWidthPt = (typeof opts.contentWidthPt === 'number') ? opts.contentWidthPt : (pageWidthPt - marginPt*2);
    const contentWidthPx = Math.round(contentWidthPt * (96/72));
    const rowsPerPage = typeof opts.rowsPerPage === 'number' ? opts.rowsPerPage : 20;
    const scaleCapture = typeof opts.scale === 'number' ? opts.scale : Math.max(1.5, Math.floor(window.devicePixelRatio || 1));
    const mergeFirst = !!opts.mergeFirst;

    const usableHeightPt = pageHeightPt - (marginPt * 2);
    const halfHeightPt = usableHeightPt / 2;

    const root = document.querySelector('#dashboardModal .modal-content') || document.getElementById('dashboardContainer') || document.body;
    const table = _selectTableForDashboard(root);
    if (!table) return { ok: false, reason: 'no-table' };

    const wrappers = buildWrappersFromTable(table, contentWidthPx, rowsPerPage);
    if (!wrappers || wrappers.length === 0) {
      console.warn('appendDashboardTablesToPdf: no wrappers built from table');
      return { ok: false, reason: 'no-wrappers' };
    }

    let startIndex = 0;

    if (mergeFirst && wrappers.length > 0) {
      const wrap = wrappers[0];
      const holder = document.createElement('div');
      holder.style.position = 'fixed'; holder.style.left = '0'; holder.style.top = '0';
      holder.style.opacity = '0'; holder.style.pointerEvents = 'none';
      holder.style.width = contentWidthPx + 'px';
      holder.appendChild(wrap);
      document.body.appendChild(holder);
      await new Promise(r=>setTimeout(r, 80));
      let canvas = null;
      try {
        canvas = await html2canvas(wrap, { scale: scaleCapture, useCORS:true, backgroundColor:'#ffffff', width: contentWidthPx, logging:false });
      } catch(e){ console.warn('html2canvas table wrapper failed (mergeFirst)', e); canvas = null; }
      try { document.body.removeChild(holder); } catch(e){}

      if (canvas) {
        const tmp = document.createElement('canvas');
        tmp.width = canvas.width; tmp.height = canvas.height;
        const ctx = tmp.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,tmp.width,tmp.height); try { ctx.drawImage(canvas,0,0); } catch(e){ console.warn('drawImage failed for mergeFirst tmp canvas', e); }
        const imgData = tmp.toDataURL('image/png');

        const imgWpt = tmp.width / (96/72);
        const imgHpt = tmp.height / (96/72);

        // reservedTop is header height (caller should have provided headerMeta.heightPt equal to half of usableHeight)
        const reservedTop = headerMeta && headerMeta.heightPt ? headerMeta.heightPt : halfHeightPt;
        const availableHeightPt = usableHeightPt - reservedTop; // bottom area

        // scale to fill the bottom-half area (allow up/down-scale)
        let scaleF = Math.min(contentWidthPt / imgWpt, availableHeightPt / imgHpt);
        if (!isFinite(scaleF) || scaleF <= 0) scaleF = 1;

        const drawWpt = imgWpt * scaleF;
        const drawHpt = imgHpt * scaleF;
        const left = (pageWidthPt - drawWpt) / 2;
        const top = marginPt + reservedTop; // start below header

        try {
          pdf.addImage(imgData, 'PNG', left, top, drawWpt, drawHpt);
        } catch(e) {
          console.warn('appendDashboardTablesToPdf addImage failed (mergeFirst)', e);
        }

        startIndex = 1;
      } else {
        startIndex = 0;
        pdf.addPage();
      }
    } else {
      pdf.addPage();
      startIndex = 0;
    }

    for (let i = startIndex; i < wrappers.length; i++) {
      const wrap = wrappers[i];
      pdf.addPage();

      const holder = document.createElement('div');
      holder.style.position = 'fixed'; holder.style.left = '0'; holder.style.top = '0';
      holder.style.opacity = '0'; holder.style.pointerEvents = 'none';
      holder.style.width = contentWidthPx + 'px';
      holder.appendChild(wrap);
      document.body.appendChild(holder);
      await new Promise(r=>setTimeout(r, 80));

      let canvas = null;
      try {
        canvas = await html2canvas(wrap, { scale: scaleCapture, useCORS:true, backgroundColor:'#ffffff', width: contentWidthPx, logging:false });
      } catch(e){ console.warn('html2canvas table wrapper failed', e); canvas = null; }
      try { document.body.removeChild(holder); } catch(e){}

      if (!canvas) {
        console.warn('appendDashboardTablesToPdf: canvas capture failed for wrapper index', i);
        if (i < wrappers.length - 1) pdf.addPage();
        continue;
      }

      const tmp = document.createElement('canvas');
      tmp.width = canvas.width; tmp.height = canvas.height;
      const ctx = tmp.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,tmp.width,tmp.height); try { ctx.drawImage(canvas,0,0); } catch(e){ console.warn('drawImage failed for tmp canvas', e); }
      const imgData = tmp.toDataURL('image/png');

      const imgWpt = tmp.width / (96/72);
      const imgHpt = tmp.height / (96/72);

      const reservedTop = 0;
      const contentHeightPt = pageHeightPt - (marginPt*2);
      const availableHeightPt = contentHeightPt - reservedTop;

      let scaleF = Math.min(contentWidthPt / imgWpt, availableHeightPt / imgHpt);
      if (!isFinite(scaleF) || scaleF <= 0) scaleF = 1;

      const drawWpt = imgWpt * scaleF;
      const drawHpt = imgHpt * scaleF;
      const left = (pageWidthPt - drawWpt) / 2;
      const top = marginPt + reservedTop;

      try {
        pdf.addImage(imgData, 'PNG', left, top, drawWpt, drawHpt);
      } catch(e) {
        console.warn('appendDashboardTablesToPdf addImage failed', e);
      }
    }

    return { ok: true, pagesAdded: wrappers.length };
  }

  if (!G.appendDashboardTablesToPdf) G.appendDashboardTablesToPdf = appendDashboardTablesToPdf;

})(window);
</script>
