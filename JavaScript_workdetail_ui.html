<script>
(function(window, document){
  'use strict';

  if (window._workdetailUiInstalled) return;
  window._workdetailUiInstalled = true;

  function addWorkdetailTableStyles() {
    if (document.querySelector('style[data-for="workdetail-table-fixes"]')) return;

    var css = '\
      #workDetailContent table, #workDetailContent table th, #workDetailContent table td { box-sizing: border-box !important; }\
      #workDetailContent table { table-layout: fixed !important; width: 100% !important; border-collapse: collapse !important; word-break: break-word !important; overflow-wrap: anywhere !important; font-size: 13px; }\
      #workDetailContent table th, #workDetailContent table td { white-space: normal !important; padding: 6px 8px !important; vertical-align: top !important; }\
      #workDetailContent table th:first-child, #workDetailContent table td:first-child { width: 14% !important; min-width: 110px; }\
      #workDetailContent table th:nth-child(3), #workDetailContent table td:nth-child(3) { width: 40% !important; }\
      @media (max-width: 900px) { #workDetailContent table { font-size: 12px; } #workDetailContent table th:first-child, #workDetailContent table td:first-child { width: 20%; } }\
      .wd-action-btn { white-space: nowrap; }\
    ';

    var styleEl = document.createElement('style');
    styleEl.setAttribute('data-for', 'workdetail-table-fixes');
    styleEl.appendChild(document.createTextNode(css));
    document.head.appendChild(styleEl);
  }

  function normalizeText(value) {
    return (value || '').toString().trim().toLowerCase();
  }

  function isPersonnelBudget(text) {
    var t = normalizeText(text);
    if (!t) return false;
    if (/\bงบ.*บุคลากร\b/.test(t) || /\bงบบุคลากร\b/.test(t)) return true;
    return /\bบุคลากร\b/.test(t) && /\bงบ\b/.test(t);
  }

  function looksLikeExportButton(button) {
    if (!button) return false;
    try {
      var txt = normalizeText(button.innerText || button.textContent || '');
      var action = normalizeText(button.getAttribute && button.getAttribute('data-action'));
      var cls = normalizeText(button.className || '');
      return txt.indexOf('export') !== -1 || txt.indexOf('pdf') !== -1 || txt.indexOf('ส่งออก') !== -1 ||
        action.indexOf('export') !== -1 || action.indexOf('pdf') !== -1 || /export|pdf/.test(cls);
    } catch (e) {
      return false;
    }
  }

  function createViewDetailButton(originalBtn, row) {
    var btn = document.createElement('button');
    btn.className = originalBtn && originalBtn.className ? originalBtn.className + ' wd-action-btn' : 'wd-action-btn btn btn-primary';
    btn.type = (originalBtn && originalBtn.type) ? originalBtn.type : 'button';
    btn.textContent = 'รายละเอียด';
    btn.setAttribute('data-action', 'open-work-detail');

    try {
      var firstCell = row && row.querySelector ? row.querySelector('td:first-child') : null;
      var workName = firstCell ? (firstCell.textContent || firstCell.innerText || '').trim() : '';
      if (!workName && originalBtn && originalBtn.getAttribute) {
        workName = originalBtn.getAttribute('data-work') || '';
      }
      if (workName) btn.setAttribute('data-work', workName);
    } catch (e) {}

    try {
      ['title', 'aria-label', 'data-id', 'data-row-id'].forEach(function(attr) {
        var value = originalBtn && originalBtn.getAttribute ? originalBtn.getAttribute(attr) : '';
        if (value) btn.setAttribute(attr, value);
      });
    } catch (e) {}

    return btn;
  }

  function fixActionButtonsInWorkDetail() {
    try {
      var container = document.getElementById('workDetailContent');
      if (!container) return;

      var table = container.querySelector('table');
      var tbody = table && table.querySelector('tbody');
      if (!tbody) return;

      Array.prototype.forEach.call(tbody.querySelectorAll('tr'), function(row) {
        try {
          var cells = row.querySelectorAll('td');
          if (!cells || !cells.length) return;

          var combined = ((cells[0] && (cells[0].innerText || cells[0].textContent)) || '') + ' ' +
            ((cells[1] && (cells[1].innerText || cells[1].textContent)) || '');

          var actionCell = row.querySelector('td:last-child');
          if (!actionCell) return;

          var primaryBtn = actionCell.querySelector('button, a, .btn');
          if (!primaryBtn || primaryBtn.dataset._wdReplaced === '1') return;

          if (isPersonnelBudget(combined) && looksLikeExportButton(primaryBtn)) {
            var replacement = createViewDetailButton(primaryBtn, row);
            replacement.dataset._wdReplaced = '1';
            actionCell.replaceChild(replacement, primaryBtn);
          }
        } catch (e) {
          console.warn('fixActionButtonsInWorkDetail row error', e);
        }
      });
    } catch (e) {
      console.warn('fixActionButtonsInWorkDetail error', e);
    }
  }

  function observeWorkDetailChanges() {
    var container = document.getElementById('workDetailContent');
    if (!container || window._workdetailFixObserver) return;

    try {
      window._workdetailFixObserver = new MutationObserver(function() {
        if (window._wd_fix_timeout) clearTimeout(window._wd_fix_timeout);
        window._wd_fix_timeout = setTimeout(function() {
          try { fixActionButtonsInWorkDetail(); } catch (e) { console.warn(e); }
        }, 150);
      });

      window._workdetailFixObserver.observe(container, {
        childList: true,
        subtree: true,
        attributes: true
      });
    } catch (e) {
      console.warn('observeWorkDetailChanges install failed', e);
    }
  }

  function initWorkdetailUiFixes() {
    addWorkdetailTableStyles();
    fixActionButtonsInWorkDetail();
    observeWorkDetailChanges();
    setTimeout(fixActionButtonsInWorkDetail, 600);
    setTimeout(fixActionButtonsInWorkDetail, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initWorkdetailUiFixes);
  } else {
    initWorkdetailUiFixes();
  }
})(window, document);
</script>
