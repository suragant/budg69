<script>
(function () {
  'use strict';

  var _editLogRow = null;
  var _cancelLogRow = null;
  var _currentUserEmail = '';

  function fmtB(n) {
    return Number(n || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function $(id) { return document.getElementById(id); }
  function setLoading(btnId, on, label) {
    var btn = $(btnId);
    if (!btn) return;
    btn.disabled = on;
    btn.textContent = on ? 'กำลังดำเนินการ...' : label;
  }
  function getHistoryKind(h) {
    var type = String((h && h.type) || '').toUpperCase();
    var desc = String((h && h.description) || '').toUpperCase();
    var status = String((h && h.status) || '').toUpperCase();
    if (type.indexOf('TRANSFER') !== -1 || desc.indexOf('[TRANSFER]') !== -1) {
      return { key: 'transfer', label: 'โอนงบ', className: 'tx-kind-transfer' };
    }
    if (status === 'CANCELLED' || type === 'CANCEL' || desc.indexOf('[CANCEL]') !== -1) {
      return { key: 'cancel', label: 'ยกเลิกรายการ', className: 'tx-kind-cancel' };
    }
    if (status === 'EDITED' || type === 'EDIT' || desc.indexOf('[EDIT]') !== -1) {
      return { key: 'edit', label: 'แก้ไขรายการ', className: 'tx-kind-edit' };
    }
    return { key: 'normal', label: 'เบิกจ่าย', className: 'tx-kind-normal' };
  }
  function normalizeHistoryDescription(raw, kind) {
    var text = String(raw || '').trim();
    if (!text) return '';
    if (text.indexOf('[EDIT]') !== -1) {
      var rowMatch = text.match(/\[EDIT\]\s*row\s*(\d+)/i);
      var amountMatch = text.match(/(\d+(?:\.\d+)?)\s*->\s*(\d+(?:\.\d+)?)/);
      if (rowMatch && amountMatch) return '[EDIT] รายการ #' + rowMatch[1] + ' เปลี่ยนจาก ' + amountMatch[1] + ' เป็น ' + amountMatch[2];
      if (rowMatch) return '[EDIT] แก้ไขรายการ #' + rowMatch[1];
      return '[EDIT] แก้ไขรายการ';
    }
    if (text.indexOf('[CANCEL]') !== -1) {
      var cancelRowMatch = text.match(/row\s*(\d+)/i);
      if (cancelRowMatch) return '[CANCEL] ยกเลิกรายการ #' + cancelRowMatch[1];
      return '[CANCEL] ยกเลิกรายการ';
    }
    if (text.indexOf('[TRANSFER]') !== -1) return text;
    if (/[เธเนโ]/.test(text)) {
      if (kind && kind.key === 'cancel') return '[CANCEL] ยกเลิกรายการ';
      if (kind && kind.key === 'edit') return '[EDIT] แก้ไขรายการ';
    }
    return text;
  }
  function callExpenseRpc(fnName, args) {
    args = Array.isArray(args) ? args : [];
    if (typeof window.rpcWithRetry === 'function') return window.rpcWithRetry(fnName, args);
    return new Promise(function(resolve, reject) {
      try {
        if (!(window.google && google.script && google.script.run)) {
          reject(new Error('google.script.run not available'));
          return;
        }
        var runner = google.script.run.withSuccessHandler(resolve).withFailureHandler(reject);
        if (!runner || typeof runner[fnName] !== 'function') {
          reject(new Error('RPC method not found: ' + fnName));
          return;
        }
        runner[fnName].apply(runner, args);
      } catch (e) {
        reject(e);
      }
    });
  }

  window.showHistory = function (history, currentUserEmail) {
    _currentUserEmail = currentUserEmail || (window.State && window.State.currentUser && window.State.currentUser.email) || '';

    var container = $('historyContainer');
    if (!container) return;
    if (!history || history.length === 0) {
      container.innerHTML = '<div class="tx-empty">ยังไม่มีประวัติการทำรายการ</div>';
      return;
    }

    container.innerHTML = '<div class="tx-list">' + history.map(function (h) {
      var ts = new Date(h.timestamp).toLocaleString('th-TH');
      var ed = h.expenseDate
        ? new Date(h.expenseDate + 'T00:00:00').toLocaleDateString('th-TH')
        : new Date(h.timestamp).toLocaleDateString('th-TH');

      var status = h.status || 'ACTIVE';
      var isCancelled = status === 'CANCELLED';
      var isEdited = status === 'EDITED';
      var kind = getHistoryKind(h);
      var badgeClass = isCancelled ? 'tx-badge-cancelled' : isEdited ? 'tx-badge-edited' : 'tx-badge-active';
      var badgeText = isCancelled ? 'ยกเลิกแล้ว' : isEdited ? 'แก้ไขแล้ว' : 'ใช้งาน';
      var borderColor = isCancelled ? '#ef9a9a' : isEdited ? '#ffe082' : '#667eea';
      var amtStyle = isCancelled ? 'text-decoration:line-through;color:#aaa;' : 'font-weight:bold;color:#FF9800;';
      var quantityValue = Number(h.quantity || 0) || 0;
      var normalizedDescription = normalizeHistoryDescription(h.description || '', kind);
      var description = escapeHtml(normalizedDescription || '');
      var detailText = description || 'ไม่มีรายละเอียดเพิ่มเติม';
      var detailClass = description ? 'tx-desc' : 'tx-desc is-empty';
      if (kind.key === 'transfer') detailClass += ' is-transfer';
      else if (kind.key === 'edit') detailClass += ' is-edit';
      else if (kind.key === 'cancel') detailClass += ' is-cancel';

      var actionsHtml = '';
      if (!isCancelled && kind.key !== 'transfer' && h.logRowIndex) {
        actionsHtml = '<div class="tx-actions">' +
          '<button type="button" class="tx-btn-edit" data-logrow="' + h.logRowIndex + '" data-amount="' + h.amount + '" data-date="' + (h.expenseDate || '') + '" data-desc="' + escapeHtml(normalizedDescription || '') + '">✏️ แก้ไข</button>' +
          '<button type="button" class="tx-btn-cancel" data-logrow="' + h.logRowIndex + '" data-amount="' + h.amount + '">🗑️ ยกเลิก</button>' +
          '</div>';
      }

      return '<section class="tx-card' + (isCancelled ? ' is-cancelled' : '') + '" style="border-left:4px solid ' + borderColor + ';">' +
        '<div class="tx-card-head">' +
          '<div class="tx-amount-block">' +
            '<div class="tx-amount" style="' + amtStyle + '">' + fmtB(h.amount) + '<span class="tx-amount-unit">บาท</span></div>' +
            '<div class="tx-meta">' +
              '<span><strong>วันที่เบิก</strong> ' + escapeHtml(ed) + '</span>' +
              '<span><strong>บันทึกเมื่อ</strong> ' + escapeHtml(ts) + '</span>' +
              '<span><strong>ผู้บันทึก</strong> ' + escapeHtml(h.user || '-') + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="tx-head-right">' +
            '<span class="tx-kind-badge ' + kind.className + '">' + kind.label + '</span>' +
            '<span class="tx-badge ' + badgeClass + '">' + badgeText + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="' + detailClass + '">' + detailText + '</div>' +
        '<div class="tx-summary">' +
          (quantityValue > 0 ? '<div class="tx-summary-card"><span class="tx-summary-label">จำนวนเบิกจ่าย</span><span class="tx-summary-value">' + escapeHtml(quantityValue) + '</span></div>' : '') +
          '<div class="tx-summary-card"><span class="tx-summary-label">ยอดใช้ไปหลังรายการ</span><span class="tx-summary-value">' + fmtB(h.newUsed) + ' บาท</span></div>' +
          '<div class="tx-summary-card"><span class="tx-summary-label">คงเหลือหลังรายการ</span><span class="tx-summary-value is-balance">' + fmtB(h.newRemaining) + ' บาท</span></div>' +
        '</div>' +
        '<div class="tx-footer">' +
          '<div class="tx-note">' + (h.editedBy ? '<strong>แก้ไขล่าสุดโดย:</strong> ' + escapeHtml(h.editedBy) : '<strong>สถานะ:</strong> พร้อมใช้งาน') + '</div>' +
          actionsHtml +
        '</div>' +
      '</section>';
    }).join('') + '</div>';

    container.onclick = function (e) {
      var editBtn = e.target.closest('.tx-btn-edit');
      var cancelBtn = e.target.closest('.tx-btn-cancel');
      if (editBtn) openEditModal(editBtn);
      if (cancelBtn) openCancelModal(cancelBtn);
    };
  };

  if (!window.__expenseHistoryDelegated) {
    document.addEventListener('click', function (e) {
      var editBtn = e.target && e.target.closest ? e.target.closest('.tx-btn-edit') : null;
      var cancelBtn = e.target && e.target.closest ? e.target.closest('.tx-btn-cancel') : null;
      if (editBtn) {
        e.preventDefault();
        openEditModal(editBtn);
      }
      if (cancelBtn) {
        e.preventDefault();
        openCancelModal(cancelBtn);
      }
    });
    window.__expenseHistoryDelegated = true;
  }

  function openEditModal(btn) {
    _editLogRow = Number(btn.getAttribute('data-logrow'));
    if (!_editLogRow) return;
    $('editAmount').value = btn.getAttribute('data-amount') || '';
    $('editDate').value = btn.getAttribute('data-date') || '';
    $('editDescription').value = btn.getAttribute('data-desc') || '';
    $('editExpenseInfo').textContent = 'แก้ไขรายการ #' + _editLogRow;
    $('editExpenseSave').textContent = '💾 บันทึก';
    $('editExpenseSave').disabled = false;
    if (typeof window.openModal === 'function') window.openModal('editExpenseModal', { keepOthers: true, zIndex: 20000 });
    else $('editExpenseModal').classList.add('active');
    $('editAmount').focus();
  }

  function closeEditModal() {
    if (typeof window.closeModal === 'function') window.closeModal('editExpenseModal');
    else $('editExpenseModal').classList.remove('active');
    _editLogRow = null;
  }

  $('editExpenseClose').addEventListener('click', closeEditModal);
  $('editExpenseModal').addEventListener('click', function (e) {
    if (e.target === this) closeEditModal();
  });

  $('editExpenseSave').addEventListener('click', function () {
    if (!_editLogRow) return;
    var amt = parseFloat($('editAmount').value);
    var date = $('editDate').value;
    var desc = $('editDescription').value.trim();

    if (isNaN(amt) || amt <= 0) {
      if (typeof showCustomAlert === 'function') showCustomAlert('แจ้งเตือน', 'จำนวนเงินต้องมากกว่า 0', 'info');
      return;
    }

    setLoading('editExpenseSave', true, '💾 บันทึก');

    callExpenseRpc('editExpense', [_editLogRow, amt, desc, date])
      .then(function (res) {
        setLoading('editExpenseSave', false, '💾 บันทึก');
        if (res && res.success) {
          closeEditModal();
          if (typeof showCustomAlert === 'function') showCustomAlert('✅ สำเร็จ', 'แก้ไขรายการเรียบร้อยแล้ว', 'success');
          _reloadAfterEdit();
        } else {
          if (typeof showCustomAlert === 'function') showCustomAlert('❌ ผิดพลาด', (res && res.message) || 'เกิดข้อผิดพลาด', 'error');
        }
      })
      .catch(function (err) {
        setLoading('editExpenseSave', false, '💾 บันทึก');
        if (typeof showCustomAlert === 'function') showCustomAlert('❌ ผิดพลาด', String(err), 'error');
      });
  });

  function openCancelModal(btn) {
    _cancelLogRow = Number(btn.getAttribute('data-logrow'));
    if (!_cancelLogRow) return;
    var amt = Number(btn.getAttribute('data-amount') || 0);
    $('cancelExpenseInfo').textContent = 'รายการ #' + _cancelLogRow + ' จำนวน ' + fmtB(amt) + ' บาท จะถูกยกเลิก และยอดงบประมาณจะถูกคืนกลับอัตโนมัติ';
    $('cancelReason').value = '';
    $('cancelExpenseConfirm').textContent = '🗑️ ยืนยันยกเลิก';
    $('cancelExpenseConfirm').disabled = false;
    if (typeof window.openModal === 'function') window.openModal('cancelExpenseModal', { keepOthers: true, zIndex: 20000 });
    else $('cancelExpenseModal').classList.add('active');
    $('cancelReason').focus();
  }

  function closeCancelModal() {
    if (typeof window.closeModal === 'function') window.closeModal('cancelExpenseModal');
    else $('cancelExpenseModal').classList.remove('active');
    _cancelLogRow = null;
  }

  $('cancelExpenseClose').addEventListener('click', closeCancelModal);
  $('cancelExpenseModal').addEventListener('click', function (e) {
    if (e.target === this) closeCancelModal();
  });

  $('cancelExpenseConfirm').addEventListener('click', function () {
    if (!_cancelLogRow) return;
    var reason = $('cancelReason').value.trim();
    if (!reason) {
      if (typeof showCustomAlert === 'function') showCustomAlert('แจ้งเตือน', 'กรุณาระบุเหตุผลการยกเลิก', 'info');
      return;
    }

    setLoading('cancelExpenseConfirm', true, '🗑️ ยืนยันยกเลิก');

    callExpenseRpc('cancelExpense', [_cancelLogRow, reason])
      .then(function (res) {
        setLoading('cancelExpenseConfirm', false, '🗑️ ยืนยันยกเลิก');
        if (res && res.success) {
          closeCancelModal();
          if (typeof showCustomAlert === 'function') showCustomAlert('✅ สำเร็จ', 'ยกเลิกรายการเรียบร้อยแล้ว', 'success');
          _reloadAfterEdit();
        } else {
          if (typeof showCustomAlert === 'function') showCustomAlert('❌ ผิดพลาด', (res && res.message) || 'เกิดข้อผิดพลาด', 'error');
        }
      })
      .catch(function (err) {
        setLoading('cancelExpenseConfirm', false, '🗑️ ยืนยันยกเลิก');
        if (typeof showCustomAlert === 'function') showCustomAlert('❌ ผิดพลาด', String(err), 'error');
      });
  });

  function _reloadAfterEdit() {
    if (typeof window.loadData === 'function') window.loadData();
    var historyModal = $('historyModal');
    if (historyModal && (historyModal.classList.contains('active') || historyModal.style.display !== 'none')) {
      var itemId = window.State && window.State.selectedItem && (window.State.selectedItem.itemId || window.State.selectedItem.rowIndex);
      if (itemId && typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (h) {
            if (typeof window.showHistory === 'function') window.showHistory(h);
          })
          .getTransactionHistory(itemId);
      }
    }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Escape') return;
    if ($('editExpenseModal').classList.contains('active')) closeEditModal();
    if ($('cancelExpenseModal').classList.contains('active')) closeCancelModal();
  });

  console.log('ExpenseEdit module loaded');
})();
</script>
