<script>
(function(window, document){
  'use strict';

  if (window._delegatedClickHandlerInstalled) return;
  window._delegatedClickHandlerInstalled = true;

  function routeAction(btn) {
    if (!btn || !btn.getAttribute) return false;

    var action = btn.getAttribute('data-action');
    try {
      switch (action) {
        case 'show-alerts':
          if (typeof window.showAlerts === 'function') { window.showAlerts(); return true; }
          if (typeof window.safeShowAlerts === 'function') { window.safeShowAlerts(); return true; }
          return false;
        case 'show-dashboard':
          if (typeof window.showDashboard === 'function') { window.showDashboard(); return true; }
          return false;
        case 'logout':
          if (typeof window.logout === 'function') { window.logout(); return true; }
          return false;
        case 'reset-filters':
          if (typeof window.resetFilters === 'function') { window.resetFilters(); return true; }
          return false;
        case 'print-dashboard':
          if (typeof window.printDashboard === 'function') { window.printDashboard(); return true; }
          return false;
        case 'export-dashboard':
          if (typeof window.exportDashboardCapture === 'function') {
            try { window.exportDashboardCapture(); return true; } catch (e) { console.warn('exportDashboardCapture threw', e); }
          }
          if (typeof window.exportDashboardCoordinator === 'function') {
            try {
              window.exportDashboardCoordinator({ fileName: 'Dashboard_' + (new Date()).toISOString().slice(0, 10) + '.pdf' });
              return true;
            } catch (e) { console.warn('exportDashboardCoordinator threw', e); }
          }
          if (typeof window.exportDashboard === 'function') {
            try { window.exportDashboard(); return true; } catch (e) { console.warn('exportDashboard threw', e); }
          }
          return false;
        case 'print-workdetail':
          if (typeof window.printWorkDetail === 'function') { window.printWorkDetail(); return true; }
          return false;
        case 'export-workdetail':
          if (typeof window.exportWorkDetailCapture === 'function') { window.exportWorkDetailCapture(); return true; }
          if (typeof window.exportCurrentDetail === 'function') { window.exportCurrentDetail(); return true; }
          return false;
        case 'close-modal': {
          var target = btn.getAttribute('data-target');
          if (target && typeof window.closeModal === 'function') { window.closeModal(target); return true; }
          return false;
        }
        case 'open-expense': {
          var id = btn.getAttribute('data-id') || btn.getAttribute('data-item-id');
          if (id && typeof window.openExpense === 'function') { window.openExpense(id); return true; }
          return false;
        }
        case 'open-history':
        case 'view-history': {
          var historyId = btn.getAttribute('data-id') || btn.getAttribute('data-item-id');
          if (historyId && typeof window.openHistory === 'function') { window.openHistory(historyId); return true; }
          return false;
        }
        case 'open-transfer':
          if (typeof window.openTransferModal === 'function') { window.openTransferModal(); return true; }
          return false;
        case 'open-work-detail': {
          var work = btn.getAttribute('data-work');
          if (work && typeof window.showWorkExpenseTypes === 'function') { window.showWorkExpenseTypes(work); return true; }
          return false;
        }
        case 'open-budget-items': {
          var workName = btn.getAttribute('data-work');
          var budgetType = btn.getAttribute('data-budget-type');
          if (workName && budgetType && typeof window.showBudgetTypeItems === 'function') {
            window.showBudgetTypeItems(workName, budgetType);
            return true;
          }
          return false;
        }
        default: {
          var inline = btn.getAttribute('onclick');
          if (!inline) return false;

          try {
            var match = inline.match(/^\s*([a-zA-Z0-9_$.]+)\s*\(/);
            if (!match || !match[1]) return false;

            var fn = window;
            match[1].split('.').forEach(function(part) {
              if (fn && typeof fn === 'object') fn = fn[part];
            });

            if (typeof fn === 'function') {
              fn.apply(btn);
              return true;
            }
          } catch (e) {
            console.warn('inline onclick parse failed', e);
          }

          return false;
        }
      }
    } catch (err) {
      console.error('routeAction error', action, err);
      return false;
    }
  }

  function delegatedClickHandler(e) {
    try {
      if (window._supportBudgetContainerId) {
        var supportContainer = document.getElementById(window._supportBudgetContainerId);
        if (supportContainer && supportContainer.contains(e.target)) return;
      }

      var btn = e.target && e.target.closest ? e.target.closest('[data-action], [data-id], .record-btn, button') : null;
      if (!btn) return;

      var handled = routeAction(btn);
      if (!handled) return;

      try { e.preventDefault(); } catch (err) {}
      try { e.stopPropagation(); } catch (err) {}
    } catch (err) {
      console.error('delegatedClickHandler error', err);
    }
  }

  document.addEventListener('click', delegatedClickHandler, false);
})(window, document);
</script>
