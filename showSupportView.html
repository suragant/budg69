<script>
(function(){
  console.log('showSupportView module loaded');

  window.State = window.State || {};

  var _mainStateSnapshot = null;
  var _supportBuilt = false;

  // Snapshot main state before support overwrites it
  function snapshotMainState(){
    try {
      _mainStateSnapshot = {
        allItems: Array.isArray(window.State.allItems) ? window.State.allItems.slice() : [],
        filteredItems: Array.isArray(window.State.filteredItems) ? window.State.filteredItems.slice() : []
      };
      console.log('showSupportView: snapshot main state (%d items)', _mainStateSnapshot.allItems.length);
    } catch(e) { console.warn('showSupportView: snapshot failed', e); }
  }

  // Restore main state from snapshot
  function restoreMainState(){
    try {
      if (_mainStateSnapshot) {
        window.State.allItems = _mainStateSnapshot.allItems;
        window.State.filteredItems = _mainStateSnapshot.filteredItems;
        console.log('closeSupportView: restored main state (%d items)', _mainStateSnapshot.allItems.length);
        _mainStateSnapshot = null;
      } else {
        console.warn('closeSupportView: no snapshot available, reloading main data');
        if (typeof window.loadData === 'function') {
          window.loadData();
        }
      }
    } catch(e) { console.warn('closeSupportView: state restore failed', e); }
  }

  // Build support UI inside section-support
  function buildSupportDom(){
    if (_supportBuilt) return;

    var section = document.getElementById('section-support');
    if (!section) {
      console.warn('section-support not found');
      return;
    }

    // Build support header
    var header = document.createElement('div');
    header.className = 'support-sidebar-head';
    header.innerHTML = '\
      <div class="support-sidebar-title-row">\
        <div class="support-sidebar-icon" aria-hidden="true">SP</div>\
        <div>\
          <div class="support-sidebar-kicker">เงินอุดหนุน</div>\
          <div class="support-sidebar-title">งบเงินอุดหนุนที่ได้รับจัดสรรจากสำนักงบประมาณ</div>\
        </div>\
      </div>\
      <div class="support-sidebar-actions">\
        <div class="support-sidebar-field">\
          <label for="supportYear">ปีงบประมาณ</label>\
          <select id="supportYear"></select>\
        </div>\
        <input type="hidden" id="supportFiscal" value="10">\
        <button id="supportLoad" class="btn btn-primary">โหลด</button>\
        <button id="supportExport" class="btn btn-secondary">Export PDF</button>\
      </div>';

    section.insertBefore(header, section.firstChild);

    // Populate year select (current year down to -4)
    try {
      var ysel = document.getElementById('supportYear');
      if (ysel && ysel.options.length === 0) {
        var thisYear = (new Date()).getFullYear();
        for (var y = thisYear; y >= thisYear - 4; y--) {
          var opt = document.createElement('option');
          opt.value = y;
          opt.text = y;
          ysel.appendChild(opt);
        }
      }
    } catch (e) { console.warn('populate supportYear failed', e); }

    // Set container ID for support client
    try { window._supportBudgetContainerId = 'supportBudgetContainer'; } catch(e){}

    // Bind load/export buttons
    setTimeout(function(){
      try {
        var loadBtn = document.getElementById('supportLoad');
        if (loadBtn) {
          loadBtn.addEventListener('click', function(){
            try {
              if (typeof window.loadSupportItemsList === 'function') {
                window.loadSupportItemsList();
              } else {
                console.warn('loadSupportItemsList not available yet');
              }
            } catch (err) { console.error('supportLoad error', err); }
          }, false);
        }

        var exportBtn = document.getElementById('supportExport');
        if (exportBtn) {
          exportBtn.addEventListener('click', function(e){
            try { e && e.preventDefault && e.preventDefault(); } catch(_) {}
            try {
              if (typeof window.initSupportExport === 'function') {
                try { window.initSupportExport(); } catch(e){ console.warn('initSupportExport threw', e); }
                setTimeout(function(){
                  try {
                    var ev = new MouseEvent('click', { bubbles: true, cancelable: true, view: window });
                    exportBtn.dispatchEvent(ev);
                  } catch(e){ /* ignore */ }
                }, 80);
                return;
              }

              var yearEl = document.getElementById('supportYear');
              var fiscalEl = document.getElementById('supportFiscal');
              var year = yearEl ? Number(yearEl.value) : (new Date()).getFullYear();
              var fiscal = fiscalEl ? Number(fiscalEl.value) : 10;
              exportBtn.disabled = true;
              var origText = exportBtn.innerHTML;
              exportBtn.innerHTML = 'กำลังสร้าง PDF...';
              window.rpcWithRetry('exportSupportReportPdf_inline', ['monthly', { year: year, fiscalStartMonth: fiscal, includeLogo: false, fileName: 'Support_' + year }]).then(function(res){
                exportBtn.disabled = false;
                exportBtn.innerHTML = origText;
                if (!res || !res.success) return alert('สร้าง PDF ไม่สำเร็จ: ' + (res && res.message || 'Unknown'));
                var b64 = res.data && res.data.base64;
                if (!b64) return alert('server ไม่ส่งข้อมูล PDF');
                var dataUrl = 'data:application/pdf;base64,' + b64;
                fetch(dataUrl).then(function(r){ return r.blob(); }).then(function(blob){
                  var url = URL.createObjectURL(blob);
                  window.open(url, '_blank');
                  setTimeout(function(){ try{ URL.revokeObjectURL(url); }catch(e){} }, 60*1000);
                }).catch(function(err){ console.error('blob creation failed', err); try{ window.open('data:application/pdf;base64,'+b64, '_blank'); }catch(e){ alert('ไม่สามารถเปิดไฟล์ PDF ได้'); }});
              }).catch(function(err){
                exportBtn.disabled = false;
                exportBtn.innerHTML = origText;
                console.error('export failed', err);
                alert('เกิดข้อผิดพลาดขณะสร้าง PDF (ดู console)');
              });
            } catch (err) {
              console.error('supportExport click error', err);
            }
          }, false);
        }
      } catch (e) {
        console.warn('support button bindings failed', e);
      }
    }, 80);

    _supportBuilt = true;
  }

  function initSupportClientWithRetry(maxAttempts, intervalMs){
    maxAttempts = maxAttempts || 20; intervalMs = intervalMs || 120;
    var attempts = 0;
    var tid = setInterval(function(){
      attempts++;
      try{
        if(typeof window.initSupportClient === 'function'){ try{ window.initSupportClient(); }catch(e){} clearInterval(tid); return; }
        if(typeof window.loadSupportItemsList === 'function'){ try{ window.loadSupportItemsList(); }catch(e){} clearInterval(tid); return; }
      }catch(e){}
      if(attempts >= maxAttempts){ clearInterval(tid); console.warn('Support client init retry timed out'); }
    }, intervalMs);
  }

  function showSupportView(options){
    options = options || {};

    // Snapshot main state before switching
    snapshotMainState();

    window._supportMode = true;

    // Build support DOM if not already done
    buildSupportDom();

    // Use shell navigation to switch to support section
    if (typeof window.switchSection === 'function') {
      window.switchSection('support');
    }

    // Initialize support client
    initSupportClientWithRetry(25, 120);

    // Only push history entry on explicit user navigation (not popstate or initial load)
    if (!options.skipPushState) {
      try{ history.pushState({page:'support'}, 'Support', window.location.pathname + '?page=support'); }catch(e){}
    }

    console.log('showSupportView done; supportMode=', !!window._supportMode);
  }

  function closeSupportView(){
    window._supportMode = false;

    // Restore main state
    restoreMainState();

    // Use shell navigation to switch back to budget items
    if (typeof window.switchSection === 'function') {
      window.switchSection('budget-items');
    }

    // Re-render main cards from restored state
    try {
      var container = document.getElementById('budgetContainer');
      if (container && typeof window.renderCards === 'function' && Array.isArray(window.State.filteredItems)) {
        window.renderCards(window.State.filteredItems);
      }
    } catch(e) { console.warn('closeSupportView: re-render failed', e); }

    console.log('closeSupportView done; supportMode=', !!window._supportMode);
  }

  // popstate handling: keep UI in sync with history back/forward
  window.addEventListener('popstate', function(e){
    try {
      var state = e.state || null;
      if (state && state.page === 'support') {
        if (!window._supportMode) {
          showSupportView({skipPushState: true});
        }
      } else {
        if (window._supportMode) {
          closeSupportView();
        }
      }
    } catch (err) { console.warn('popstate handler error', err); }
  }, false);

  window.showSupportView = showSupportView;
  window.closeSupportView = closeSupportView;

  // If URL already has page=support on load, open it without pushing history
  try{
    var qp = new URLSearchParams(location.search);
    if(qp.get('page') === 'support'){
      setTimeout(function(){ showSupportView({skipPushState: true}); }, 200);
    }
  }catch(e){}
})();
</script>
