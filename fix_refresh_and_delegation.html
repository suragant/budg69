<script>
(function(window, document){
  'use strict';

  if (window._wd_fix_refresh_and_delegation_installed) return;
  window._wd_fix_refresh_and_delegation_installed = true;

  function refreshUI(reason) {
    try {
      console.info('[WD-FIX] refreshUI ->', reason);
      if (typeof window.loadData === 'function') {
        window.loadData();
        return true;
      }
      if (window.State && Array.isArray(window.State.filteredItems) && typeof window.renderCards === 'function') {
        window.renderCards(window.State.filteredItems.length ? window.State.filteredItems : (window.State.allItems || []));
        return true;
      }
      if (typeof window.displayData === 'function' && window.State && Array.isArray(window.State.allItems)) {
        window.displayData({
          success: true,
          items: window.State.allItems,
          alerts: window.State.budgetAlerts || [],
          user: window.State.user || {}
        });
        return true;
      }
    } catch (e) {
      console.warn('[WD-FIX] refreshUI error', e);
    }
    return false;
  }

  function installSupportModeWatcher() {
    if (window._wd_support_mode_watcher_installed) return;
    window._wd_support_mode_watcher_installed = true;

    var lastSupportState = !!window._supportMode;
    setInterval(function(){
      try {
        var current = !!window._supportMode;
        if (current === lastSupportState) return;
        lastSupportState = current;
        if (!current) {
          refreshUI('support-exit');
        }
      } catch (e) {}
    }, 1200);
  }

  window._wd_refreshUI = refreshUI;
  installSupportModeWatcher();
})();
</script>
