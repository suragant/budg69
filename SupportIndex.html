<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>งบเงินอุดหนุนที่ได้รับจัดสรรจากสำนักงบประมาณ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <?!= include('Styles'); ?>
</head>
<body>
  <div class="container" style="padding-top:18px;">
    <div class="header" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <h1>📋 งบเงินอุดหนุนที่ได้รับจัดสรรจากสำนักงบประมาณ</h1>
          <div id="userEmail" style="font-size:13px;color:#666;"></div>
        </div>
        <div>
          <button id="backBtn" class="btn btn-secondary" onclick="window.history.back()">กลับ</button>
        </div>
      </div>
    </div>

    <div style="background:#fff;padding:12px;border-radius:8px;margin-bottom:12px;box-shadow:0 4px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;">
      <label>ปี:</label>
      <select id="supportYear"></select>

      <div style="display:flex;align-items:center;gap:8px;">
        <label style="color:#666;">เริ่มงบเดือน:</label>
        <div style="padding:6px 10px;border-radius:6px;background:#f5f5f5;color:#333;font-weight:600;">ต.ค.</div>
      </div>
      <input type="hidden" id="supportFiscal" value="10">

      <button id="supportLoad" class="btn btn-primary">โหลด</button>
      <button id="supportExport" class="btn btn-secondary">Export PDF</button>
    </div>

    <!-- report area kept minimal: we will not auto-render quarterly here; only cards for recording -->
    <div id="supportReport" style="background:#fff;padding:12px;border-radius:8px;min-height:120px;">
      <div style="color:#666;padding:12px;">กำลังรอการโหลดงบเงินอุดหนุนที่ได้รับจัดสรรจากสำนักงบประมาณ...</div>
    </div>

    <!-- cards container -->
    <div id="budgetContainer" class="budget-grid" style="margin-top:16px;"></div>

    <div id="expenseModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="expenseModalTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="expenseModalTitle">บันทึกการเบิกจ่าย</h2>
          <div id="modalDetails" style="color: #666; font-size: 14px; margin-top: 5px;"></div>
        </div>

        <div id="expenseFormErrors" style="display: none; padding: 10px; background: #fee; border: 1px solid #f99; border-radius: 4px; margin-bottom: 15px; color: #c00;" role="alert" aria-live="assertive"></div>

        <form id="expenseForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="expenseDate">วันที่เบิกจ่าย *</label>
            <input type="date" id="expenseDate" class="form-input" required aria-describedby="expenseDateError">
            <div id="expenseDateError" class="form-error" role="alert"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="expenseAmount">จำนวนเงิน (บาท) *</label>
            <input type="number" id="expenseAmount" class="form-input" required min="0.01" step="0.01" aria-describedby="expenseAmountError">
            <div id="expenseAmountError" class="form-error" role="alert"></div>
          </div>

          <div class="form-group" id="expenseQuantityGroup" style="display:none;">
            <label class="form-label" for="expenseQuantity">จำนวนเบิกจ่าย *</label>
            <input type="number" id="expenseQuantity" class="form-input" min="0.01" step="0.01" aria-describedby="expenseQuantityError">
            <div id="expenseQuantityHelp" style="color:#666;font-size:12px;margin-top:6px;"></div>
            <div id="expenseQuantityError" class="form-error" role="alert"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="expenseDescription">รายละเอียด</label>
            <textarea id="expenseDescription" class="form-input" rows="3" maxlength="500" aria-describedby="expenseDescError expenseDescCharCount"></textarea>
            <div id="expenseDescError" class="form-error" role="alert"></div>
            <small id="expenseDescCharCount" style="color: #999; display: block; margin-top: 5px;">0 / 500 ตัวอักษร</small>
          </div>

          <div class="modal-actions">
            <button type="submit" class="btn btn-primary" id="expenseSubmitBtn">บันทึก</button>
            <button type="button" class="btn btn-secondary" data-action="close-modal" data-target="expenseModal">ยกเลิก</button>
          </div>
        </form>
      </div>
    </div>

    <div id="historyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="historyModalTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="historyModalTitle">ประวัติการทำรายการ</h2>
          <div id="historyDetails" style="color: #666; font-size: 14px; margin-top: 5px;"></div>
        </div>

        <div id="historyLoading" style="display: none; text-align: center; padding: 20px;" role="status" aria-live="polite">
          กำลังโหลดประวัติ...
        </div>

        <div id="historyContainer" style="max-height: 60vh; overflow-y: auto;"></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" data-action="close-modal" data-target="historyModal">ปิด</button>
        </div>
      </div>
    </div>

    <div id="customAlertModal" class="modal" role="alertdialog" aria-labelledby="customAlertTitle" aria-modal="true">
      <div class="modal-content" style="max-width: 400px;">
        <div class="modal-header">
          <h2 id="customAlertTitle">แจ้งเตือน</h2>
        </div>
        <div id="customAlertMessage" style="padding: 15px; line-height: 1.6;"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-primary" data-action="close-modal" data-target="customAlertModal" id="customAlertOkBtn">ตกลง</button>
        </div>
      </div>
    </div>
  </div>

  <!-- includes in the same order as main Index -->
  <?!= include('JavaScript_helpers'); ?> 
  <?!= include('JavaScript_modal_manager'); ?>    <!-- modal manager -->
  <?!= include('JavaScript_alerts_manager'); ?>   <!-- alerts manager (provides showCustomAlert) -->
  <?!= include('set_support_prefix_in_page'); ?>
  <?!= include('client_rpc_adapter'); ?>          <!-- rpcWithRetry, rpcRecordSupportExpense, rpcRecordExpense -->
  <?!= include('JavaScript_ui'); ?>
  <?!= include('JavaScript_core'); ?>
  <?!= include('JavaScript_actions'); ?>

  <!-- support client (expose functions) -->
  <?!= include('support_client'); ?>
  <?!= include('support_inline_quantity'); ?>
  <?!= include('support_export'); ?>
</body>
</html>
