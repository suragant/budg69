  <!-- SAFE IFRAME-WRITE SHIM -->
  <script nonce="SSR2ii5fRwtNJngHlEUxow">
  (function(){
    'use strict';

    const SAFE_IFRAME_WHITELIST = ['userHtmlFrame', 'reportFrame', 'previewFrame'];

    try {
      if (Document.prototype.__patched_for_userHtmlFrame_write) return;

      const OrigDocWrite = Document.prototype.write;
      const OrigDocOpen = Document.prototype.open;
      const OrigDocClose = Document.prototype.close;

      function isFullHtmlString(s) {
        if (!s || typeof s !== 'string') return false;
        const t = s.trim().toLowerCase();
        return t.startsWith('<!doctype') ||
               t.startsWith('<html') ||
               /<head[\s\S]*?>/i.test(s) ||
               /<body[\s\S]*?>/i.test(s);
      }

      function isWhitelistedIframeId(id) {
        if (!id || typeof id !== 'string') return false;
        return SAFE_IFRAME_WHITELIST.includes(id) && /^[a-zA-Z0-9_-]+$/.test(id);
      }

      Document.prototype.write = function(...args) {
        try {
          if (this === window.document) {
            return OrigDocWrite.apply(this, args);
          }

          var win = this.defaultView || this.parentWindow;
          var frame = win && win.frameElement;

          if (!frame || !frame.id) {
            return OrigDocWrite.apply(this, args);
          }

          if (!isWhitelistedIframeId(frame.id)) {
            console.warn('Attempted write to non-whitelisted iframe:', frame.id);
            return OrigDocWrite.apply(this, args);
          }

          var first = args.length > 0 ? args[0] : '';
          if (typeof first === 'string' && isFullHtmlString(first)) {
            try {
              if ('srcdoc' in frame) {
                frame.srcdoc = first;
                frame.addEventListener('load', function _onLoad(){
                  try { frame.title = frame.title || ''; } catch(e){}
                  frame.removeEventListener('load', _onLoad);
                }, { once: true });
                return;
              }

              var blob = new Blob([first], { type: 'text/html; charset=utf-8' });
              var url = URL.createObjectURL(blob);
              frame.src = url;
              setTimeout(function(){
                try { URL.revokeObjectURL(url); } catch(e){}
              }, 60000);
              return;
            } catch (e) {
              console.warn('safe iframe write attempt failed:', e);
            }
          }
        } catch (e) {
          console.error('Document.prototype.write shim error:', e);
        }
        return OrigDocWrite.apply(this, args);
      };

      Document.prototype.open = function() {
        try {
          var win = this.defaultView || this.parentWindow;
          var frame = win && win.frameElement;
          if (frame && isWhitelistedIframeId(frame.id)) return;
        } catch(e){}
        return OrigDocOpen.apply(this, arguments);
      };

      Document.prototype.close = function() {
        try {
          var win = this.defaultView || this.parentWindow;
          var frame = win && win.frameElement;
          if (frame && isWhitelistedIframeId(frame.id)) return;
        } catch(e){}
        return OrigDocClose.apply(this, arguments);
      };

      Document.prototype.__patched_for_userHtmlFrame_write = true;
      console.info('Safe Document.prototype.write shim installed for iframe whitelisting');
    } catch (err) {
      console.error('Failed to install safe iframe write shim:', err);
    }
  })();
  </script>

  <!-- SAFE EVENT INTERCEPTION -->
  <script nonce="SSR2ii5fRwtNJngHlEUxow">
  (function(){
    'use strict';

    if (window.__support_pointer_intercept_installed) return;
    window.__support_pointer_intercept_installed = true;

    const SAFE_CONTAINER_IDS = ['supportBudgetContainer', 'budgetContainer'];

    function isValidContainer(elem) {
      if (!elem || !(elem instanceof HTMLElement)) return false;
      if (!document.body.contains(elem)) return false;
      if (elem.closest('iframe')) return false;
      if (elem.tagName.match(/^(FORM|INPUT|TEXTAREA|SELECT)$/i)) return false;
      return true;
    }

    function resolveContainerSafely() {
      try {
        if (window._supportBudgetContainerId) {
          const customId = String(window._supportBudgetContainerId).trim();
          if (/^[a-zA-Z0-9_-]+$/.test(customId)) {
            const elem = document.getElementById(customId);
            if (isValidContainer(elem)) return elem;
          }
        }

        for (const id of SAFE_CONTAINER_IDS) {
          const elem = document.getElementById(id);
          if (isValidContainer(elem)) return elem;
        }
      } catch (e) {
        console.warn('resolveContainerSafely error:', e);
      }
      return null;
    }

    function findActionButton(target) {
      if (!target) return null;
      const actionBtn = target.closest ? target.closest('[data-action], .record-btn, .support-record, [data-id]') : null;
      if (!actionBtn) return null;

      const btnId = actionBtn.getAttribute('data-id') || actionBtn.getAttribute('data-item-id');
      if (btnId && !/^[a-zA-Z0-9\-_. ]*$/.test(btnId)) {
        console.warn('Invalid button ID format:', btnId);
        return null;
      }
      return actionBtn;
    }

    function handleActionForBtn(btn) {
      if (!btn) return false;

      const id = btn.getAttribute('data-id') ||
                 btn.getAttribute('data-item-id') ||
                 (btn.closest && btn.closest('.budget-card') && btn.closest('.budget-card').getAttribute('data-item-id'));

      if (btn.matches && (btn.matches('[data-action="view-history"]') ||
                          btn.classList.contains('btn-history') ||
                          btn.classList.contains('support-history'))) {
        try {
          if (typeof openHistoryModal === 'function') {
            openHistoryModal(id);
            return true;
          }
        } catch (e) {
          console.warn('openHistoryModal error:', e);
        }
        try {
          if (typeof window.openHistory === 'function') {
            window.openHistory(id);
            return true;
          }
        } catch (e) {
          console.warn('openHistory error:', e);
        }
        return true;
      }

      if (btn.matches && (btn.matches('[data-action="open-expense"]') ||
                          btn.matches('.record-btn') ||
                          btn.classList.contains('support-record') ||
                          btn.matches('[data-action="record"]'))) {
        try {
          if (typeof hideOtherModalsKeep === 'function') {
            hideOtherModalsKeep('supportExpenseModal');
          }
        } catch(e){}
        try {
          if (typeof openSupportExpenseModal === 'function') {
            return openSupportExpenseModal(id, '');
          }
        } catch (e) {
          console.warn('openSupportExpenseModal error:', e);
        }
        try {
          if (typeof openExpense === 'function') {
            return openExpense(id);
          }
        } catch (e) {
          console.warn('openExpense error:', e);
        }
        return true;
      }

      return false;
    }

    function captureHandler(e) {
      try {
        const container = resolveContainerSafely();
        if (!container) return;

        const btn = findActionButton(e.target);
        if (!btn || !container.contains(btn)) return;

        const handled = handleActionForBtn(btn);
        if (handled) {
          try {
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            if (e.stopPropagation) e.stopPropagation();
            if (e.preventDefault) e.preventDefault();
          } catch(_){}
        }
      } catch (err) {
        console.warn('support_pointer_intercept error:', err);
      }
    }

    document.addEventListener('pointerdown', captureHandler, true);
    document.addEventListener('touchstart', captureHandler, true);
    document.addEventListener('click', captureHandler, false);

    console.log('Safe event interception installed with container validation');
  })();
  </script>
