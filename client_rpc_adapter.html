<script>
/*
 client_rpc_adapter.js (wrapped in <script> for Apps Script include)
 - Provides rpcWithRetry + convenience rpcRecordSupportExpense/rpcRecordExpense wrappers.
 - Safe to include on pages that call google.script.run directly.
*/
(function(window){
  'use strict';
  if (!window) return;
  if (window.__wd_client_rpc_installed) return;
  window.__wd_client_rpc_installed = true;

  function _isRateLimitError(err) {
    if (!err) return false;
    try {
      var s = String(err);
      return /429|Too Many Requests|rate limit|RateLimit|QuotaExceeded|Quota exceeded/i.test(s);
    } catch(e){ return false; }
  }
  function _sleep(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

  window.rpcWithRetry = window.rpcWithRetry || function(fnName, args, opts){
    opts = opts || {};
    var attempts = Math.max(1, opts.attempts || 4);
    var baseDelay = opts.baseDelay || 400;
    var maxDelay = opts.maxDelay || 5000;
    var timeoutMs = Math.max(3000, opts.timeoutMs || 15000);

    return new Promise(function(resolve, reject){
      var attempt = 0;
      var finished = false;
      var timeoutId = null;

      function settle(kind, value) {
        if (finished) return;
        finished = true;
        try { if (timeoutId) clearTimeout(timeoutId); } catch (e) {}
        if (kind === 'resolve') resolve(value);
        else reject(value);
      }

      function armTimeout() {
        try { if (timeoutId) clearTimeout(timeoutId); } catch (e) {}
        timeoutId = setTimeout(function() {
          settle('reject', new Error('RPC timeout: ' + fnName));
        }, timeoutMs);
      }

      function callViaGoogle() {
        if (!(window.google && google.script && google.script.run)) {
          return false;
        }
        armTimeout();
        try {
          var runner = google.script.run
            .withSuccessHandler(function(res){ settle('resolve', res); })
            .withFailureHandler(function(err){
              if (_isRateLimitError(err) && attempt < attempts) {
                var expo = Math.min(maxDelay, baseDelay * Math.pow(2, attempt - 1));
                var jitter = expo * (0.5 + Math.random() * 0.5);
                console.warn('rpcWithRetry: retrying due to rate-limit in', Math.round(jitter), 'ms', fnName, 'attempt', attempt);
                _sleep(jitter).then(callOnce);
                return;
              }
              settle('reject', err);
            });
          if (!runner || typeof runner[fnName] !== 'function') {
            settle('reject', new Error('RPC method not found: ' + fnName));
            return true;
          }
          runner[fnName].apply(runner, args || []);
          return true;
        } catch (e) {
          return false;
        }
      }

      function callViaFallbackQueue() {
        if (typeof window.wd_call === 'function') {
          armTimeout();
          try {
            Promise.resolve(window.wd_call(fnName, args || []))
              .then(function(res) { settle('resolve', res); })
              .catch(function(err) { settle('reject', err); });
            return true;
          } catch (e) {}
        }
        if (typeof window.enqueueRpc === 'function') {
          armTimeout();
          try {
            Promise.resolve(window.enqueueRpc(function(){
              return new Promise(function(resolveInner, rejectInner){
                try {
                  if (!window.google || !google.script || !google.script.run) return rejectInner(new Error('google.script.run not available'));
                  var runner = google.script.run.withSuccessHandler(resolveInner).withFailureHandler(rejectInner);
                  if (!runner || typeof runner[fnName] !== 'function') return rejectInner(new Error('RPC method not found: ' + fnName));
                  runner[fnName].apply(runner, args || []);
                } catch(err){ rejectInner(err); }
              });
            }))
              .then(function(res) { settle('resolve', res); })
              .catch(function(err) { settle('reject', err); });
            return true;
          } catch (e) {}
        }
        return false;
      }

      function callOnce(){
        attempt++;
        if (callViaGoogle()) return;
        if (callViaFallbackQueue()) return;
        if (_isRateLimitError(new Error('No RPC mechanism available')) && attempt < attempts) {
          var expo2 = Math.min(maxDelay, baseDelay * Math.pow(2, attempt - 1));
          var jitter2 = expo2 * (0.5 + Math.random() * 0.5);
          _sleep(jitter2).then(callOnce);
          return;
        }
        settle('reject', new Error('No RPC mechanism available'));
      }
      callOnce();
    });
  };

  // convenience wrappers used by support inline UI
  window.rpcRecordSupportExpense = window.rpcRecordSupportExpense || function(itemId, amount, description, expenseDate, quantity){
    return window.rpcWithRetry('recordSupportExpenseSupport', [itemId, amount, description, expenseDate, quantity], { attempts: 4 })
      .catch(function(err){ return { success:false, message: String(err) }; });
  };

  window.rpcRecordExpense = window.rpcRecordExpense || function(itemId, amount, description, expenseDate){
    return window.rpcWithRetry('recordExpense', [itemId, amount, description, expenseDate], { attempts: 4 })
      .catch(function(err){ return { success:false, message: String(err) }; });
  };

})(window);
</script>
